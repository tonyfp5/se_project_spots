<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spots</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="page">

    
      <header class="header page__section">
        <img src="" alt="Spots logo" class="header__logo" />
      </header>

      
      <main class="content">

        <section class="profile page__section">
          <div class="profile__avatar-container">
            <img src="" alt="User avatar" class="profile__avatar" />
            <button   type="button"
              class="profile__avatar-edit-button">
            <img src="<%=require('./images/pencilAv.svg')%>" alt="Edit avatar"
              aria-label="Edit avatar"/>
            </button>
          </div>

          <div class="profile__column">
            <div class="profile__info">
              <h1 class="profile__name">Your Name</h1>
              <p class="profile__description">Your description</p>
            </div>

            <button type="button" class="profile__edit-button">
              <img class="profile__edit-icon" alt="Edit icon" />
              Edit Profile
            </button>
          </div>

          <button type="button" class="profile__add-button">
            <img class="profile__add-icon" alt="Add icon" />
            New Post
          </button>
        </section>

        
        <section class="cards page__section">
          <ul class="cards__list">

            <template id="card-template">
              <li class="card">
                <button
                  class="card__delete-button"
                  type="button"
                  aria-label="Delete card"
                ></button>

                <img src="" alt="Card image" class="card__image" />

                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button
                    type="button"
                    class="card__like-button"
                    aria-label="Like card"
                  ></button>
                </div>
              </li>
            </template>

          </ul>
        </section>
      </main>

     
      <footer class="footer page__section">
        <p class="footer__copyright">
          2026 © Spots by Antonio Asumu
        </p>
      </footer>

      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-button"></button>
          <h2 class="modal__title">Edit profile</h2>

          <form class="modal__form" name="edit-profile-form" novalidate>
            <label class="modal__label">
              Name
              <input
                id="profile-name-input"
                name="name"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                minlength="2"
                maxlength="40"
                required
              />
              <span id="profile-name-input-error" class="modal__error"></span>
            </label>

            <label class="modal__label">
              Description
              <input
                id="profile-description-input"
                name="description"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                minlength="2"
                maxlength="200"
                required
              />
              <span
                id="profile-description-input-error"
                class="modal__error"
              ></span>
            </label>

            <button type="submit" class="modal__submit-button">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-button"></button>
          <h2 class="modal__title">New Post</h2>

          <form class="modal__form" name="new-post-form" novalidate>
            <label class="modal__label">
              Image link
              <input
                id="card-image-input"
                type="url"
                class="modal__input"
                name="link"
                placeholder="Enter image link"
                required
              />
              <span id="card-image-input-error" class="modal__error"></span>
            </label>

            <label class="modal__label">
              Description
              <input
                id="card-description-input"
                type="text"
                class="modal__input"
                name="name"
                placeholder="Enter card description"
                minlength="2"
                maxlength="30"
                required
              />
              <span
                id="card-description-input-error"
                class="modal__error"
              ></span>
            </label>

            <button type="submit" class="modal__submit-button">Save</button>
          </form>
        </div>
      </div>
      
      <div class="modal modal_type_preview" id="preview-modal">
        <div class="modal__image-container">
          <button type="button" class="modal__close-button modal__close-button_type_preview"></button>
          <img src="" alt="" class="modal__image" />
          <h2 class="modal__caption"></h2>
        </div>
      </div>

      <div class="modal" id="delete-card-modal">
        <div class="modal__container-delete">
          <button type="button" class="modal__close-button modal__close-button_type_preview"></button>
          <h2 class="modal__title-delete">Are you sure you want to delete this image?</h2>

          <form class="modal__form" name="delete-card-form" novalidate>
            <div class="modal__buttons">
              <button type="button" class="modal__delete-button">Delete</button>
              <button type="button" class="modal__cancel-button">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal" id="edit-avatar-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-button"></button>
          <h2 class="modal__title">Change profile picture</h2>

          <form class="modal__form" name="edit-avatar-form" novalidate>
            <label class="modal__label">
              Avatar link
              <input
                id="avatar-link-input"
                type="url"
                class="modal__input"
                name="avatar"
                required
              />
              <span id="avatar-link-input-error" class="modal__error"></span>
            </label>

            <button type="submit" class="modal__submit-button">Save</button>
          </form>
        </div>
      </div>

    </div>
  </body>
</html>
