<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spots</title>
  </head>

  <body class="page">
    <header class="header page__section">
      <img class="header__logo" alt="Spots logo" />
    </header>

    <main class="content">
      <section class="profile page__section">
        <div class="profile__avatar-container">
          <img class="profile__avatar" alt="User avatar" />
          <button class="profile__avatar-edit-button"></button>
        </div>

        <div class="profile__info">
          <h1 class="profile__name"></h1>
          <p class="profile__description"></p>
          <button class="profile__edit-button">Edit Profile</button>
        </div>

        <button class="profile__add-button">New Post</button>
      </section>

      <section class="cards page__section">
        <ul class="cards__list"></ul>
      </section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">© 2025 Toni</p>
    </footer>

    <template id="card-template">
      <li class="card">
        <img class="card__image" alt="" />
        <button class="card__delete-button"></button>
        <div class="card__content">
          <h2 class="card__title"></h2>
          <div class="card__like-container">
            <button class="card__like-button"></button>
            <span class="card__like-count">0</span>
          </div>
        </div>
      </li>
    </template>

    <div class="popup popup_type_edit-profile">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">Edit profile</h2>
        <form class="popup__form popup__form_type_edit-profile" novalidate>
          <input
            type="text"
            name="name"
            class="popup__input"
            placeholder="Name"
            required
          />
          <span class="popup__input-error"></span>

          <input
            type="text"
            name="about"
            class="popup__input"
            placeholder="About"
            required
          />
          <span class="popup__input-error"></span>

          <button class="popup__save-button" type="submit">Save</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_new-post">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">New Post</h2>
        <form class="popup__form popup__form_type_new-post" novalidate>
          <input
            type="text"
            name="name"
            class="popup__input"
            placeholder="Title"
            required
          />
          <span class="popup__input-error"></span>

          <input
            type="url"
            name="link"
            class="popup__input"
            placeholder="Image link"
            required
          />
          <span class="popup__input-error"></span>

          <button class="popup__save-button" type="submit">Save</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_edit-avatar">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">Change profile picture</h2>
        <form class="popup__form popup__form_type_edit-avatar" novalidate>
          <input
            type="url"
            name="avatar"
            class="popup__input"
            placeholder="Avatar link"
            required
          />
          <span class="popup__input-error"></span>

          <button class="popup__save-button" type="submit">Save</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_preview">
      <div class="popup__preview-container">
        <button class="popup__close-button"></button>
        <img class="popup__preview-image" alt="" />
        <p class="popup__preview-caption"></p>
      </div>
    </div>

    <div class="popup popup_type_confirm">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">Are you sure?</h2>
        <form class="popup__form popup__form_type_confirm">
          <button
            class="popup__save-button popup__save-button_type_confirm"
            type="submit"
          >
            Yes
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
